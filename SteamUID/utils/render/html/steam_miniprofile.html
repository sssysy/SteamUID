<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <style>
        /* === 1. Global Reset === */
        /* 不使用 border-box：原始 Steam CSS 用默认 content-box，
           playersection height:62px 是内容高度，不含 16px padding，
           否则头像(90px)会溢出到下方详情区造成重叠 */
        * { margin: 0; padding: 0; }
        body {
            background: transparent;
            transform: scale(1.5);
            transform-origin: top left;
        }

        /* === 2. Persona & Border Colors (shared_global.css L284-318) === */
        .persona, a.persona, .persona a,
        .friend_status_offline, .friend_status_offline div, .friend_status_offline a {
            color: #898989;
        }
        .persona.online, a.persona.online, .persona.online a,
        .friend_status_online, .friend_status_online div, .friend_status_online a {
            color: #57cbde;
        }
        .persona.in-game, a.persona.in-game, .persona.in-game a,
        .friend_status_in-game, .friend_status_in-game div, .friend_status_in-game a {
            color: #90ba3c;
        }
        .persona.golden, a.persona.golden, .persona.golden a,
        .friend_status_golden, .friend_status_golden div, .friend_status_golden a {
            color: #e4ca63;
        }
        .border_color_offline { border-color: #898989; }
        .border_color_online { border-color: #57cbde; }
        .border_color_in-game { border-color: #90ba3c; }
        .border_color_golden { border-color: #e4ca64; }

        /* === 3. Text Shadow === */
        .text_shadow { text-shadow: 1px 1px 4px #000; }

        /* === 4. Miniprofile Container (shared_global.css L320-599) === */
        .miniprofile_container {
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            width: 328px;
            font-family: "Motiva Sans", Sans-serif, Arial, Helvetica, sans-serif;
            font-weight: normal;
            background: radial-gradient(ellipse farthest-corner at 20% 30%, rgb(76, 80, 91) 0%, rgb(52, 55, 63) 50%, rgb(40, 44, 50) 100%);
            isolation: isolate;  /* 创建层叠上下文，确保 z-index:-1 的背景层在容器背景之上 */
        }

        .miniprofile_playersection {
            position: relative;
            display: flex;
            flex-direction: row;
            z-index: 1;
            height: 62px;
            padding: 16px;
        }

        .miniprofile_playersection .playersection_avatar {
            width: 90px;
            height: 90px;
            background: none;
            border-bottom-width: 2px;
            border-bottom-style: solid;
        }

        .miniprofile_playersection .playersection_avatar img {
            width: 90px;
            height: 90px;
            box-sizing: border-box;
            background: none;
        }

        .miniprofile_playersection .playersection_avatar_frame {
            position: absolute;
            z-index: 1;
            width: 107px;
            height: 107px;
            top: 8px;
            left: 8px;
            pointer-events: none;
        }
        .miniprofile_playersection .playersection_avatar_frame > img {
            width: 100%;
            height: 100%;
            background: none;
        }

        .miniprofile_playersection .player_content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 16px;
            text-shadow: 1px 1px 4px #000;
        }

        .miniprofile_playersection .player_content .persona {
            font-size: 20px;
        }

        .miniprofile_playersection .player_content .persona,
        .miniprofile_playersection .player_content .secondaryname {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 200px;
        }

        .miniprofile_playersection .player_content .friend_status_offline,
        .miniprofile_playersection .player_content .friend_status_online,
        .miniprofile_playersection .player_content .friend_status_in-game,
        .miniprofile_playersection .player_content .friend_status_golden {
            font-size: 10px;
        }

        .miniprofile_detailssection {
            display: flex;
            flex-direction: column;
            padding: 16px 16px 8px 16px;
        }

        .miniprofile_detailssection.not_in_game {
            padding-top: 24px;
        }

        .miniprofile_featuredcontainer {
            display: flex;
            flex-direction: row;
            height: 34px;
            padding-left: 16px;
            margin-bottom: 8px;
        }

        .miniprofile_featuredcontainer .badge_icon {
            width: 34px;
            height: 34px;
            position: relative;
        }

        .miniprofile_featuredcontainer .description {
            margin-left: 12px;
            margin-top: auto;
            margin-bottom: auto;
            font-size: 14px;
            overflow: hidden;
            white-space: nowrap;
            font-family: "Motiva Sans", Arial, Helvetica, sans-serif;
        }

        .miniprofile_featuredcontainer .description .name {
            overflow: hidden;
            text-overflow: ellipsis;
            color: #b1b1b1;
        }

        .miniprofile_featuredcontainer .description .xp {
            font-size: 12px;
            color: #6b6a6a;
        }

        .miniprofile_featuredcontainer .friendPlayerLevel {
            margin-top: 0;
        }

        .miniprofile_backdropblur {
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .miniprofile_backdrop {
            background: linear-gradient(to bottom, rgba(24, 26, 30, .7) 5%, rgba(24, 26, 30, .4) 95%);
        }

        .miniprofile_nameplatecontainer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
        }

        .miniprofile_nameplate {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top right;
        }

<body>
    <div class="miniprofile_container">

        <!-- Background Layer -->
        <div class="miniprofile_nameplatecontainer">
            {{background_inner_html}}
        </div>

        <!-- Player Info Layer -->
        <div class="miniprofile_playersection text_shadow">
            {{avatar_frame_html}}
            <div class="playersection_avatar {{border_color_class}}">
                <img src="{{avatar_url}}">
            </div>
            <div class="player_content">
                <span class="persona {{persona_class}}">{{persona_name}}</span>
                <span class="friend_status_{{status_class}}">{{status_text}}</span>
            </div>
        </div>

        <!-- Details Layer -->
        <div class="miniprofile_detailssection miniprofile_backdropblur not_in_game miniprofile_backdrop">
            {{featured_badge_html}}
            <div class="miniprofile_featuredcontainer">
                <div class="friendPlayerLevel {{level_classes}}">
                    <span class="friendPlayerLevelNum">{{level_num}}</span>
                </div>
                <div class="description">
                    <div class="name">Steam 等级</div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
